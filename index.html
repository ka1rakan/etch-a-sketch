<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
    <header>Etch A Sketch</header>
    <div class="userPanel">
        <p class="current-mode-text"></p>
        <input type="button" class="modeButton" id="rainbow-mode" value="Rainbow"/>
        <input type="button" class="modeButton" id="dark-mode" value="Dark"/>
        <div class="slideContainer">
            <input 
            type="range"
            min="1"
            max="100"
            value="50"
            class="slider"
            id="myRange"
            >
            <p id="demo"></p>
        </div>
        <button class="button-27" id="reset">Reset</button>
    </div>
    <main>
        <div id="container"></div>
    </main>
    <footer></footer>
</body>
</html>
